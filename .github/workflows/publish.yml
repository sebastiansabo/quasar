name: Publish to PyPI

# Fires when you publish a GitHub Release.
# Draft releases do NOT trigger this — only "Publish release".
on:
  release:
    types: [published]
  # lets you fire it by hand from the Actions tab (useful for TestPyPI)
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        # The faithfulness contract must hold before anything ships.
        run: pytest -q

  publish:
    name: Publish to PyPI
    needs: [build, test]          # will not publish if tests fail
    runs-on: ubuntu-latest
    environment: pypi             # must match the Environment name in PyPI + GitHub
    permissions:
      id-token: write             # REQUIRED for trusted publishing (no API token needed)
    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
